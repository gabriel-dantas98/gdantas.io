name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches-ignore: ["main"]
  workflow_dispatch:

# Cancel in-flight runs on the same PR/branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + type-check + i18n parity + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: yarn

      - name: Restore .next cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # New cache when packages or source change; falls back to nearest match.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock') }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: i18n key parity (pt vs en)
        run: yarn i18n:check

      - name: Lint
        run: yarn lint

      - name: Type-check
        run: yarn type-check

      - name: Build
        run: yarn build

      - name: Static HTML export
        run: yarn next export
