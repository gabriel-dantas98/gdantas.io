name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches-ignore: ["main"]
  workflow_dispatch:

# Cancel in-flight runs on the same PR/branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + type-check + i18n parity + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Restore .next cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # New cache when packages or source change; falls back to nearest match.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/yarn.lock') }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: i18n key parity (pt vs en)
        run: yarn i18n:check

      - name: Lint
        run: yarn lint

      - name: Type-check
        run: yarn type-check

      - name: Build
        run: yarn build

      - name: Static HTML export
        run: yarn next export

      - name: Upload static export
        uses: actions/upload-artifact@v4
        with:
          name: out-${{ github.sha }}
          path: out
          retention-days: 1

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download static export
        uses: actions/download-artifact@v4
        with:
          name: out-${{ github.sha }}
          path: out

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/yarn.lock') }}

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        run: yarn e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
